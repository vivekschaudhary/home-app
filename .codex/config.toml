# Codex CLI configuration for Compass
# Codex CLI auto-discovers AGENTS.md at repo root.
# This file adds MCP servers and notes.

[mcp.github]
type = "http"
url = "https://api.githubcopilot.com/mcp/"

[mcp.atlassian]
type = "http"
url = "https://mcp.atlassian.com/v1/sse"

[mcp.sentry]
type = "http"
url = "https://mcp.sentry.dev/mcp"

[mcp.figma]
type = "http"
url = "https://mcp.figma.com/mcp"

[model]
default = "gpt-5"

# Notes for whoever runs Codex here:
# - Compass uses compass/ as the framework source of truth.
# - Codex plays Reviewer and Security Reviewer ONLY.
# - Use .codex/prompts/reviewer.md for code review.
# - Use .codex/prompts/security-reviewer.md when diff touches auth/PII/payments/secrets/sessions/external input.
# - Disputes from Engineer go to PM (human), not back to you. Hold positions.
# - The Codex CLI config format evolves; check `codex --help` and adjust [mcp.*] syntax if needed.
#   Prompt files themselves remain correct regardless of CLI changes.
