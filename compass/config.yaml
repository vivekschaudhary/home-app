# Compass configuration — central place for team decisions.
# Workflows read this on every run.

schema_version: 1
framework: compass
framework_version: 1.0

# ─── HITL ─────────────────────────────────────────────────────────────
# Human-in-the-loop level
# - every_phase  : approve at every role handoff (heavy)
# - milestones   : approve at major milestones (default)
# - merge_only   : approve only at PR merge (lightest)
hitl_level: milestones

# ─── Agent registry ───────────────────────────────────────────────────
# Per [agent-agnostic-role-assignment] (compass/framework/canon.md, v0.3.8).
# Declares each supported agent's invocation pattern + context-loading
# convention + auth requirements. Generalizes the [agent-handoff] v0.3.5
# pattern (reviewer-only agent-agnosticism) to every role.
#
# ADAPTER LAYER — upstream, not Compass-side. Compass does not write
# per-agent adapters. For API-based agents (openai, deepseek, codestral,
# any future API provider), use an existing adapter library:
#   - LiteLLM (recommended) — 100+ providers, unified API, Python + JS
#   - Vercel AI SDK — TypeScript-first, similar provider abstraction
#   - OpenRouter — hosted proxy, OpenAI-compatible API for many models
#   - LangChain LLM providers — if already in your stack
# Each declares model strings in its own convention (LiteLLM uses
# `openai/gpt-5`, `anthropic/claude-opus-4-7`, etc.). Auth via standard
# env vars (`OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, etc.).
#
# For full-agent CLIs (claude, codex, gemini) the CLI tool IS the
# adapter — reads local files, runs its own loop, no extra adapter needed.
#
# To add a new agent: add an entry here, then reference it in
# tool_assignments below. Per-agent prompt-directory scaffolding for CLI
# agents (v0.3.9 candidate) will follow this registry as source of truth;
# per-agent adapter docs are NOT shipped — upstream libraries handle that.
agents:
  claude:
    invocation: cli                 # Claude Code CLI / IDE plugin
    context_loading: local-files
    files: [AGENTS.md, CLAUDE.md, "compass/roles/<role>.md"]
    auth_env: ANTHROPIC_API_KEY     # or claude-code login
    maturity: production
    note: "Claude Code reads local files automatically on session start."

  codex:
    invocation: cli                 # OpenAI Codex CLI
    context_loading: local-files
    files: [AGENTS.md, ".codex/prompts/<role>.md", "compass/roles/<role>.md"]
    auth_env: OPENAI_API_KEY        # or codex login
    maturity: production
    note: "Reads .codex/prompts/<role>.md as the role entrypoint."

  openai:
    invocation: api                 # OpenAI API (ChatGPT / GPT models)
    context_loading: api-system-prompt
    auth_env: OPENAI_API_KEY
    adapter: litellm                # or vercel-ai-sdk / openrouter / langchain
    maturity: api-mature            # API stable; web UI requires manual paste
    note: "Use an upstream adapter library — LiteLLM model string `openai/gpt-5` (or current), Vercel AI SDK provider, OpenRouter, or LangChain. Compass passes `compass/roles/<role>.md` as system prompt. Distinct from `codex` (also OpenAI but a different CLI product)."

  gemini:
    invocation: cli                 # Google Gemini CLI
    context_loading: local-files
    files: [AGENTS.md, ".gemini/prompts/<role>.md", "compass/roles/<role>.md"]
    auth_env: GOOGLE_API_KEY        # or gemini login
    maturity: production
    note: "Mirrors codex pattern. CLI package: @google/gemini-cli."

  deepseek:
    invocation: api                 # DeepSeek API
    context_loading: api-system-prompt
    auth_env: DEEPSEEK_API_KEY
    adapter: litellm                # or vercel-ai-sdk / openrouter / langchain
    maturity: api-mature            # No first-class CLI integration
    note: "Use an upstream adapter library — LiteLLM model string `deepseek/deepseek-chat` (or current). Compass passes `compass/roles/<role>.md` as system prompt."

  codestral:
    invocation: api                 # Mistral / Codestral API
    context_loading: api-system-prompt
    auth_env: MISTRAL_API_KEY
    adapter: litellm                # or vercel-ai-sdk / openrouter / langchain
    maturity: api-mature            # No first-class CLI integration
    note: "Use an upstream adapter library — LiteLLM model string `mistral/codestral-latest` (or current). Codestral is Mistral's code-specialist model family. Compass passes `compass/roles/<role>.md` as system prompt."

  apple:
    invocation: manual              # Manual paste into Apple Intelligence
    context_loading: manual-paste
    unsupported: true               # Explicit honest deferral
    maturity: limited
    note: "Apple Intelligence is system-level (Writing Tools, Summarization) without an open API for arbitrary role-playing. Listed for visibility; not first-class. Use `custom` if you need a non-standard Apple-side workflow."

  custom:
    invocation: user-defined        # Escape valve
    context_loading: user-defined
    maturity: user-managed
    note: "Declare your own invocation pattern. Use for agents not in the registry (self-hosted model, custom CLI wrapper, internal API, etc.)."

# ─── Defaults ─────────────────────────────────────────────────────────
# Sensible defaults matching Compass's empirically-validated split per
# AGENTS.md "Tool division of labor" (Claude implements; Codex reviews —
# different-model reviewer is structurally load-bearing per v0.3.5
# same-day extension; CB-1.4 empirically validated). Any role not set
# below in tool_assignments falls back to the appropriate default here.
defaults:
  implements:   claude              # for builder/maker roles
  reviews:      codex               # for independent-model review roles
  product:      claude              # for PM/discovery/visibility roles
  tech-writes:  claude              # for documentation roles

# ─── Tool assignments ─────────────────────────────────────────────────
# Which agent (from the `agents:` registry above) plays which role.
# Validated against the registry at workflow load time.
#
# To override: change a value to any agent key from the registry above.
#   Example: pm: openai           ← use ChatGPT / GPT API for PM role
#            designer: gemini     ← use Gemini for designer role
#
# IMPORTANT — reviewer/security_reviewer constraint: must use a
# DIFFERENT MODEL than the implementer. Same-model reviewer + same-model
# author share aesthetic priors and miss what an independent-model
# reviewer catches. See AGENTS.md "Tool division of labor" for the
# structural rationale + CB-1.4 empirical validation.
tool_assignments:
  pm:                       claude    # defaults.product
  researcher:               claude    # defaults.product
  support:                  claude    # defaults.product
  designer:                 claude    # defaults.product
  ux_writer:                claude    # defaults.product
  architect:                claude    # defaults.implements
  enterprise_architect:     claude    # defaults.implements
  engineer:                 claude    # defaults.implements — writes unit/API/component tests too
  reviewer:                 codex     # defaults.reviews — writes E2E + automation framework
  security_reviewer:        codex     # defaults.reviews
  tech_writer:              claude    # defaults.tech-writes
  project_manager:          claude    # defaults.product

# ─── Connectors (MCP) ─────────────────────────────────────────────────
# Wire these up in .mcp.json. The framework references them by name here.
connectors:
  source_control:  github       # github | gitlab
  ticketing:       jira         # jira | linear | trello
  observability:   sentry       # sentry | datadog | newrelic
  design:          figma
  docs:            confluence   # confluence | notion | gdrive
  incident_alert:  slack        # slack | pagerduty | opsgenie | linear

# ─── Sprint cadence ───────────────────────────────────────────────────
sprint:
  length_weeks:   1
  end_day:        friday
  comms_channel:  slack         # where sprint announcements go
  jira_sync:      true

# ─── Conventions ──────────────────────────────────────────────────────
conventions:
  bet_id_format:       jira_style       # PROJ-42
  story_id_format:     jira_style       # PROJ-43 (sub-ticket of bet)
  branch_pattern:      "<type>/<id>-<slug>"
  commit_prefixes:     [feat, fix, chore, refactor, test, docs, spec, ops]
  merge_strategy:      squash
  pr_template:         ".github/PULL_REQUEST_TEMPLATE.md"

# ─── Routing ──────────────────────────────────────────────────────────
# What flow each work type triggers.
work_types:
  feature:                bet-driven      # /create-brief → /create-story → /build
  change:                 bet-driven      # same; tagged change
  tech_debt:              bet-driven      # tagged on bet
  continuous_improvement: bet-driven      # tagged on bet
  fix:                    /fix            # bug; can be hygiene
  triage:                 /triage         # incident
  ops:                    /ops            # non-code; can be hygiene

# Hygiene flag: when true on /ops or /fix, skips bet requirement.
hygiene_path_enabled: true

# ─── Bet types and outcomes ───────────────────────────────────────────
bet_types:
  - foundational-product
  - foundational-architecture
  - okr
  - feature
  - architectural-initiative
  - tech-debt
  - continuous-improvement

bet_outcomes: [won, learning, inconclusive]

# ─── Measurement ──────────────────────────────────────────────────────
measurement:
  default_window_days:    30
  default_checkin_cadence: weekly       # weekly | biweekly | monthly
  cron_owner:             enterprise_architect
  data_unavailable_action: hitl_flag    # hitl_flag | extend | mark_inconclusive

# ─── CI/CD ────────────────────────────────────────────────────────────
ci_cd:
  pipeline_command:       "pnpm build"               # Vercel git integration auto-deploys on push
  deploy_on_merge:        true                       # Vercel production deploy on merge to main
  rollback_command:       "vercel rollback"          # promote previous deployment

  # Canary artifacts — one per deploy target in the foundational stack.
  # Set by /setup-foundation-architecture Phase B step 16. Multi-target
  # projects (web + mobile + service + ...) get one entry per target.
  # Required: every target named in the foundational architecture's Stack
  # table has a corresponding entry here with `verified_at` populated.
  # Empty list = canaries not yet run; Phase B Verification fails.
  #
  # Example:
  #   canary_artifacts:
  #     - kind: web
  #       url: "https://aura-web-canary.vercel.app"
  #       verified_at: "2026-05-24T14:30:00Z"
  #     - kind: mobile
  #       url: "https://expo.dev/accounts/aura/projects/.../builds/abc123"
  #       verified_at: "2026-05-26T19:15:00Z"
  #       notes: "EAS dev-build profile; installs on iOS sim + Pixel emulator"
  #
  # kind: web | mobile | container | other  (free-form via `other` + notes)
  canary_artifacts:
    - kind: web
      url: "https://home-app-brown-nu.vercel.app/api/health"
      verified_at: "2026-06-05T16:44:36Z"
      notes: >-
        Vercel preview deploy (project kind-tree/home-app, dpl_A8UstbS1EvsitB979SHYPzr5JBrq).
        Built remotely in 30s; /api/health returns 200 {status:ok}. Proves the
        Next.js + Vercel + pnpm-workspace (@wealth/jobs transpiled) + Inngest-route
        composition deploys. Raw deployment URL is behind Vercel deployment
        protection; the public production alias is the canary. Supabase/Inngest/
        Sentry report "not-configured" until env keys are provisioned (follow-up).

# ─── DRI logging ──────────────────────────────────────────────────────
dri:
  required_for_decisions:  [rationale, area_tag, alternatives, reversibility]
  required_for_risks:      [likelihood, impact, mitigation, area_tag]
  required_for_issues:     [severity, owner, area_tag]
  decisions_append_only:   true
  p0_alerts:               true
  auto_log_framework_decisions: true

# ─── Disputes ─────────────────────────────────────────────────────────
disputes:
  arbiter: pm           # not reviewer-wins-by-default

# ─── Setup ordering ───────────────────────────────────────────────────
# Hard rule: product foundation must exist before architecture foundation.
setup:
  enforce_product_before_architecture: true

# ─── Foundation stack (Phase A decisions) ─────────────────────────────
# Populated by /setup-foundation-architecture Phase B step 19 from the
# elicited picks in docs/foundation/architecture.md (v1, approved 2026-06-05).
# Source-of-truth is the architecture doc; this is the machine-readable cache.
foundation_stack:
  anchor:            typescript-vercel       # primary language + deployment model
  frontend:         "Next.js + Turbopack + Tailwind"
  backend:          "Next.js Route Handlers + REST/OpenAPI + Supabase Auth (TOTP + passkey MFA)"
  data:             "Supabase (Postgres + Storage + Auth + Vault) + Upstash Redis"
  ops:              "Vercel native CI/CD + Sentry + Inngest + GitHub Actions checks"
  repo_shape:        monorepo                 # pnpm workspaces: /app + /packages/* + /supabase
  package_manager:   pnpm
  identity_strategy: uuid-v7
  tenancy:           b2c-pooled-rls           # RLS keyed on auth.uid()
  deploy_targets:    [web]                    # → canary kinds (see ci_cd.canary_artifacts)
  fitness_functions:
    reliability:        { uptime: "99.9%", rpo_min: 5, rto_min: 30 }
    security:           { pii_encryption: "AES-256 + TLS1.2+", mfa: "100% accounts", compliance: "SOC2-TypeII-by-Q4-2026", gdpr_dsar_days: 30 }
    performance:        { p95_api_ms: 200, ttfv_min: 3, concurrency_now: 500, concurrency_target: 3000 }
    cost:               { all_in_per_mau_usd: 1.50, infra_only_per_mau_usd: 0.40 }
    operational:        { deploy_frequency: "daily", mttr_min: 30, observability_coverage: "100% critical paths" }
    sustainability:     "not load-bearing at current stage; revisit > 100k MAU"

# ─── Continuous quality scanner ───────────────────────────────────────
# Snyk-style continuous scanner across the six SDLC phases.
# Findings, not failures. Severity + confidence + suppression.
# Full check catalog lives in `compass/workflows/scan.md`.
scanner:
  mode: strict            # strict (block on Critical) | advisory (warn only)
  per_phase:              # phase-level override of mode
    product:           strict
    architecture:      strict
    build:             strict
    production_ready:  strict
    gtm:               advisory
    operate:           advisory
  suppression_policy:
    critical: hitl_approval_required        # plus DRI risk-acceptance entry
    high:     dri_justification_required    # auto-logged on suppression
    medium:   owner_acceptance_logged       # auto-logged
    low:      silent_dismissal_logged       # still logged for audit
  cron: "0 6 * * 1"       # weekly Monday 6am scan of all active bets
