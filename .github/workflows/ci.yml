name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # RLS test runs against the local Postgres service (Supabase auth shim).
      SUPABASE_DB_URL: postgres://postgres:postgres@localhost:5432/postgres
      # Placeholder public/runtime env so `next build` never reads an empty value.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key

    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" — do not also pin here
      # (pnpm/action-setup rejects specifying both).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Dependency advisory scan (gating — production deps, high/critical)
        # Scopes to production deps so dev-tool advisories (e.g. vitest) don't
        # block; high/critical in shipped deps fail the build. (Security Review)
        run: pnpm audit --prod --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Provision RLS test DB (Supabase auth shim + migrations)
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/ci-bootstrap.sql
          # Apply EVERY migration in order (the glob sorts 0001…NNNN lexically) so a
          # newly-added migration is never silently skipped — the gap that left the
          # WLT-22 tables (0011/0012) untested in CI and missing from prod (save_failed).
          for f in supabase/migrations/*.sql; do
            echo "── applying $f"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -c "grant select, insert, update, delete on all tables in schema public to authenticated;"
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -c "revoke all on metrics_first_events, metrics_ttfv_per_user, metrics_ttfv_summary, metrics_wawu_weekly, metrics_return_weekly, metrics_anomaly_weekly, metrics_funnel_stages from authenticated;"

      - name: Test (incl. live cross-tenant RLS — AC8)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify route-handler registration (mechanical-output-verification)
        run: |
          python3 - <<'PY'
          import json, sys
          m = json.load(open(".next/server/app-paths-manifest.json"))
          need = [
            "/api/auth/sign-in/route",
            "/api/auth/sign-up/route",
            "/api/auth/sign-out/route",
            "/api/auth/webauthn/register/options/route",
            "/api/auth/webauthn/register/verify/route",
            "/api/auth/webauthn/authenticate/options/route",
            "/api/auth/webauthn/authenticate/verify/route",
            "/(app)/dashboard/page",
            "/(app)/accounts/page",
            "/(app)/settings/security/page",
            "/(app)/budget/page",
            "/api/budget/route",
            "/sign-in/page",
            "/sign-up/page",
            "/unsupported/page",
            "/api/aggregation/link/start/route",
            "/api/aggregation/link/complete/route",
            "/api/aggregation/connections/route",
            "/api/aggregation/connections/[id]/disconnect/route",
            "/api/aggregation/plaid/webhook/route",
            "/settings/accounts/page",
            "/api/intent/route",
            "/api/workflow/action/route",
            "/onboarding/intent/page",
            "/forgot/page",
            "/reset/page",
            "/api/auth/callback/route",
            "/api/auth/password/reset-request/route",
            "/api/auth/password/update/route",
            "/admin/metrics/page",
          ]
          missing = [k for k in need if k not in m]
          if missing:
              print("MISSING from app-paths-manifest:", missing)
              sys.exit(1)
          print(f"all {len(need)} app routes registered in the build output")
          PY

  e2e:
    runs-on: ubuntu-latest
    env:
      # Placeholder env: the guard + smoke specs exercise routing / redirects /
      # the non-revealing error path, which don't need a live Supabase. The full
      # passkey happy-path spec is gated on E2E_PASSKEY=1 and stays skipped here.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: E2E (guard + smoke — AC2/AC3/AC6; passkey happy-path gated)
        run: pnpm e2e

  # OPS-2 — apply pending migrations to PRODUCTION after CI passes on main.
  # Gated three ways: needs [check, e2e] (so the migrations are proven against a
  # real test PG + the suite is green first), main-pushes only, and the protected
  # `production` Environment (a required human reviewer must approve each run +
  # holds the PROD_DB_URL secret). The apply is only-new + transactional (see
  # scripts/migrate-prod.sh). One-time baseline required before first enable — see
  # docs/ops/OPS-2.md.
  migrate-prod:
    needs: [check, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Apply pending migrations to production
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
        run: bash scripts/migrate-prod.sh
